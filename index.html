<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세계 다이빙 스팟 가이드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<header>
  <div class="header-logo">🤿</div>
  <div class="header-title">
    <h1>World Diving Spots</h1>
    <p>세계 최고의 다이빙 포인트 & 해양 생물 가이드</p>
  </div>
</header>

<div class="month-bar">
  <label>Best Month</label>
  <div class="months-grid">
    <button class="month-btn active" data-month="0">전체</button>
    <button class="month-btn" data-month="1">1월</button>
    <button class="month-btn" data-month="2">2월</button>
    <button class="month-btn" data-month="3">3월</button>
    <button class="month-btn" data-month="4">4월</button>
    <button class="month-btn" data-month="5">5월</button>
    <button class="month-btn" data-month="6">6월</button>
    <button class="month-btn" data-month="7">7월</button>
    <button class="month-btn" data-month="8">8월</button>
    <button class="month-btn" data-month="9">9월</button>
    <button class="month-btn" data-month="10">10월</button>
    <button class="month-btn" data-month="11">11월</button>
    <button class="month-btn" data-month="12">12월</button>
  </div>
</div>

<div class="main">
  <div id="map"></div>
  <div class="side-panel">
    <div class="panel-header">
      <h2>다이빙 스팟</h2>
      <p id="panel-subtitle">로딩 중...</p>
    </div>
    <div class="spot-list" id="spot-list"></div>
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="stat-total">—</span>
        <span class="stat-label">전체 스팟</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-highlight">—</span>
        <span class="stat-label">추천 스팟</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-creatures">—</span>
        <span class="stat-label">생물 종류</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-continents">—</span>
        <span class="stat-label">국가</span>
      </div>
    </div>
  </div>
</div>

<!-- Mobile: FAB -->
<button class="fab-list" id="fab-list" onclick="toggleSheet()">🤿 목록 보기</button>

<!-- Mobile: Bottom Sheet -->
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
  <div class="sheet-header">
    <h2 id="sheet-subtitle">다이빙 스팟</h2>
    <button class="sheet-close-btn" onclick="toggleSheet()">✕</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-stats">
    <div class="stat-item">
      <span class="stat-value" id="stat-total-m">—</span>
      <span class="stat-label">전체</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="stat-highlight-m">—</span>
      <span class="stat-label">추천</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="stat-creatures-m">—</span>
      <span class="stat-label">생물종</span>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
