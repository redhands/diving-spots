<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세계 다이빙 스팟 가이드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg:          #0f1923;
      --surface:     #182434;
      --surface-hi:  #1e2e42;
      --border:      #263547;
      --accent:      #3b82f6;
      --accent-dim:  #1d4ed8;
      --text-1:      #f1f5f9;
      --text-2:      #94a3b8;
      --text-3:      #4e6a84;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-logo { font-size: 24px; }

    .header-title h1 {
      font-size: 17px;
      font-weight: 800;
      color: var(--text-1);
      letter-spacing: 0.5px;
    }

    .header-title p {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 1px;
    }

    /* ── Month Bar ── */
    .month-bar {
      background: var(--bg);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .month-bar::-webkit-scrollbar { display: none; }

    .month-bar label {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .months-grid {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .month-btn {
      padding: 4px 11px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text-2);
      font-size: 12px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .month-btn:hover {
      border-color: var(--accent);
      color: var(--text-1);
    }

    .month-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Main ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #map { flex: 1; }

    .leaflet-container { background: #0c1520; }

    /* ── Side Panel ── */
    .side-panel {
      width: 340px;
      background: var(--bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .panel-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-header h2 {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-1);
      letter-spacing: 0.5px;
    }

    .panel-header p {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }

    /* ── Spot List ── */
    .spot-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .spot-list::-webkit-scrollbar { width: 3px; }
    .spot-list::-webkit-scrollbar-track { background: transparent; }
    .spot-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .spot-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .spot-card:hover {
      border-color: var(--accent);
      background: var(--surface-hi);
    }

    .spot-card.active {
      border-color: var(--accent);
      background: var(--surface-hi);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .spot-card.dimmed {
      opacity: 0.38;
    }
    .spot-card.dimmed:hover { opacity: 0.65; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .card-name {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-1);
    }

    .card-country {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 1px;
    }

    .best-months-wrap {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 110px;
    }

    .month-pill {
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      background: var(--surface-hi);
      color: var(--text-3);
      border: 1px solid var(--border);
    }

    .month-pill.best {
      background: var(--accent-dim);
      color: #bfdbfe;
      border-color: var(--accent);
    }

    .card-meta {
      font-size: 11px;
      color: var(--text-3);
      display: flex;
      gap: 10px;
      margin-bottom: 7px;
    }

    .card-creatures {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .creature-tag {
      background: #1a2e48;
      border: 1px solid #263f5a;
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 10px;
      color: #7eb4d4;
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }

    .stat-value {
      font-size: 16px;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-3);
      margin-top: 1px;
    }

    /* ── Map Popup ── */
    .leaflet-popup-content-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-1);
      box-shadow: 0 12px 40px rgba(0,0,0,0.8);
      padding: 0;
    }

    .leaflet-popup-tip { background: var(--surface); }
    .leaflet-popup-content { margin: 0; width: auto !important; }
    .leaflet-popup-close-button { display: none; }

    .popup-inner {
      width: 400px;
      display: flex;
      flex-direction: column;
      max-height: 520px;
    }

    .popup-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .popup-name { font-size: 16px; font-weight: 800; color: var(--text-1); margin-bottom: 2px; }
    .popup-country { font-size: 11px; color: var(--text-3); }

    .popup-header-btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      margin-left: 10px;
    }

    .popup-btn {
      padding: 4px 9px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface-hi);
      color: var(--text-2);
      font-size: 11px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .popup-btn:hover { border-color: var(--accent); color: var(--text-1); }
    .popup-btn.home { border-color: transparent; color: var(--text-3); }
    .popup-btn.home:hover { border-color: var(--border); color: var(--text-2); }

    .popup-scroll {
      overflow-y: auto;
      padding: 14px 16px;
      flex: 1;
    }

    .popup-scroll::-webkit-scrollbar { width: 3px; }
    .popup-scroll::-webkit-scrollbar-track { background: transparent; }
    .popup-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .popup-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }

    .popup-stat-box {
      background: var(--surface-hi);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 6px;
      text-align: center;
    }

    .popup-stat-icon { font-size: 16px; }
    .popup-stat-label { font-size: 10px; color: var(--text-3); margin-top: 2px; }
    .popup-stat-val { font-size: 12px; font-weight: 700; color: var(--text-1); margin-top: 1px; }

    .popup-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .popup-season-bar {
      background: var(--surface-hi);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 12px;
      color: #93c5fd;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .popup-desc {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.8;
      margin-bottom: 14px;
    }

    .popup-creatures { display: flex; flex-wrap: wrap; gap: 4px; }
    .popup-creature {
      background: #1a2e48;
      border: 1px solid #263f5a;
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 11px;
      color: #7eb4d4;
    }

    /* ── Legend ── */
    .map-legend {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }

    .map-legend h4 {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 7px;
      font-family: 'Nanum Gothic', sans-serif;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--text-2);
      margin-bottom: 4px;
      font-family: 'Nanum Gothic', sans-serif;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Pulse animation ── */
    @keyframes pulse {
      0%   { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    /* ── Zoom control ── */
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text-1) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover {
      background: var(--surface-hi) !important;
    }

    /* ── Mobile FAB (list toggle) ── */
    .fab-list {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 2000;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 28px;
      padding: 12px 18px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      gap: 6px;
      align-items: center;
    }

    /* ── Mobile Bottom Sheet ── */
    .bottom-sheet {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1500;
      background: var(--surface);
      border-top: 2px solid var(--accent);
      border-radius: 16px 16px 0 0;
      max-height: 70vh;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    }

    .bottom-sheet.open {
      transform: translateY(0);
    }

    .sheet-handle-row {
      padding: 10px 16px 0;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }

    .sheet-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: var(--border);
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sheet-header h2 {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-1);
    }

    .sheet-close-btn {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
    }

    .sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .sheet-body::-webkit-scrollbar { display: none; }

    .sheet-stats {
      display: flex;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sheet-stats .stat-item {
      border-right: 1px solid var(--border);
      padding: 8px 0;
    }
    .sheet-stats .stat-item:last-child { border-right: none; }

    /* ── Mobile popup ── */
    @media (max-width: 767px) {
      .side-panel { display: none; }
      .fab-list { display: flex; }
      .bottom-sheet { display: flex; }

      header { padding: 10px 14px; }
      .header-logo { font-size: 20px; }
      .header-title h1 { font-size: 15px; }
      .header-title p { display: none; }

      .month-bar { padding: 6px 12px; }

      .leaflet-popup-content-wrapper { max-width: calc(100vw - 24px) !important; }
      .popup-inner { width: min(400px, calc(100vw - 24px)); }
      .popup-scroll { max-height: 55vh; }

      .map-legend { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">🤿</div>
  <div class="header-title">
    <h1>World Diving Spots</h1>
    <p>세계 최고의 다이빙 포인트 & 해양 생물 가이드</p>
  </div>
</header>

<div class="month-bar">
  <label>Best Month</label>
  <div class="months-grid">
    <button class="month-btn active" data-month="0">전체</button>
    <button class="month-btn" data-month="1">1월</button>
    <button class="month-btn" data-month="2">2월</button>
    <button class="month-btn" data-month="3">3월</button>
    <button class="month-btn" data-month="4">4월</button>
    <button class="month-btn" data-month="5">5월</button>
    <button class="month-btn" data-month="6">6월</button>
    <button class="month-btn" data-month="7">7월</button>
    <button class="month-btn" data-month="8">8월</button>
    <button class="month-btn" data-month="9">9월</button>
    <button class="month-btn" data-month="10">10월</button>
    <button class="month-btn" data-month="11">11월</button>
    <button class="month-btn" data-month="12">12월</button>
  </div>
</div>

<div class="main">
  <div id="map"></div>
  <div class="side-panel">
    <div class="panel-header">
      <h2>다이빙 스팟</h2>
      <p id="panel-subtitle">전세계 17개 베스트 포인트</p>
    </div>
    <div class="spot-list" id="spot-list"></div>
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="stat-total">17</span>
        <span class="stat-label">전체 스팟</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-highlight">17</span>
        <span class="stat-label">추천 스팟</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">80+</span>
        <span class="stat-label">해양 생물종</span>
      </div>
    </div>
  </div>
</div>

<!-- Mobile: FAB -->
<button class="fab-list" id="fab-list" onclick="toggleSheet()">🤿 목록 보기</button>

<!-- Mobile: Bottom Sheet -->
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
  <div class="sheet-header">
    <h2 id="sheet-subtitle">다이빙 스팟</h2>
    <button class="sheet-close-btn" onclick="toggleSheet()">✕</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-stats">
    <div class="stat-item">
      <span class="stat-value" id="stat-total-m">17</span>
      <span class="stat-label">전체 스팟</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="stat-highlight-m">17</span>
      <span class="stat-label">추천 스팟</span>
    </div>
    <div class="stat-item">
      <span class="stat-value">80+</span>
      <span class="stat-label">생물종</span>
    </div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────
const SPOTS = [
  {
    id: 1,

    creatures: ["그레이트 화이트 샤크","바다거북","만타가오리","왕관불가사리","흰동가리","대왕조개","돌고래","혹등고래"],

  },
  {
    id: 2,
    name: "블루홀", nameEn: "Great Blue Hole",
    country: "벨리즈",

    creatures: ["불스 샤크","카리브해 리프 샤크","그루퍼","바라쿠다","너스 샤크","블랙팁 샤크"],

  },
  {
    id: 3,
    name: "갈라파고스 제도", nameEn: "Galápagos Islands",
    country: "에콰도르",
    lat: -0.9538, lng: -90.9656,

    bestMonths: [6,7,8,9,10,11],

      <div class="legend-row"><div class="legend-dot" style="background:#3b82f6"></div>이달 추천 스팟</div>
      <div class="legend-row"><div class="legend-dot" style="background:#263547"></div>다른 시즌 스팟</div>
    </div>`;
  return d;
};
legendCtrl.addTo(map);

// ── State ─────────────────────────────────
let selectedMonth  = 0;
let selectedSpotId = null;
// 현재 뷰포트에 존재하는 마커: { [spotId]: { [offset]: L.Marker } }
const activeMarkers = {};

// ── Helpers ───────────────────────────────
function isHighlighted(spot) {
  return selectedMonth === 0 || spot.bestMonths.includes(selectedMonth);
}

// ── Markers ───────────────────────────────
function buildIcon(spot, highlighted) {
  const bg     = highlighted ? spot.color : '#263547';
  const border = highlighted ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.12)';
  const pulse  = highlighted
    ? `<div style="position:absolute;inset:0;border-radius:50%;background:${spot.color}40;animation:pulse 2s ease-out infinite;"></div>`
    : '';

  return L.divIcon({
    className: '',
    html: `<div style="
        width:34px;height:34px;
        border-radius:50% 50% 50% 0;
        transform:rotate(-45deg);
        background:${bg};
        border:2px solid ${border};
        display:flex;align-items:center;justify-content:center;
        position:relative;
        box-shadow:${highlighted ? `0 3px 14px ${spot.color}70` : 'none'};
      ">
        ${pulse}
        <span style="transform:rotate(45deg);font-size:15px;line-height:1;position:relative;">${spot.icon}</span>
      </div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 34],
    popupAnchor: [0, -38]
  });
}

function buildPopupContent(spot) {
  const bestMonthText = spot.bestMonths.map(m => MONTH_NAMES[m]).join(' · ');
  const allTags = spot.creatures.map(c => `<span class="popup-creature">${c}</span>`).join('');
  return `
    <div class="popup-inner">
      <div class="popup-header">
        <div>
          <div class="popup-name">${spot.icon} ${spot.name}</div>
          <div class="popup-country">📍 ${spot.country} &nbsp;·&nbsp; ⭐ ${spot.difficulty}</div>
        </div>
        <div class="popup-header-btns">
          <button class="popup-btn" onclick="closePopup()">✕ 닫기</button>
        </div>
      </div>
      <div class="popup-scroll">
        <div class="popup-stats-grid">
          <div class="popup-stat-box"><div class="popup-stat-icon">🏊</div><div class="popup-stat-label">수심</div><div class="popup-stat-val">${spot.depth}</div></div>
          <div class="popup-stat-box"><div class="popup-stat-icon">👁</div><div class="popup-stat-label">시야</div><div class="popup-stat-val">${spot.visibility}</div></div>
          <div class="popup-stat-box"><div class="popup-stat-icon">🌡</div><div class="popup-stat-label">수온</div><div class="popup-stat-val">${spot.waterTemp}</div></div>
        </div>
        <div class="popup-section-label">Best Season</div>
        <div class="popup-season-bar">${bestMonthText}</div>
        <div class="popup-section-label">소개</div>
        <div class="popup-desc">${spot.desc}</div>
        <div class="popup-section-label">주요 해양 생물</div>
        <div class="popup-creatures">${allTags}</div>
      </div>
    </div>`;
}

// 현재 뷰포트에 보이는 세계 복사본 오프셋(배수of360) 목록
function visibleOffsets() {
  const b    = map.getBounds();
  const west = b.getWest(), east = b.getEast();
  const kMin = Math.ceil((west - 180) / 360);
  const kMax = Math.floor((east + 180) / 360);
  const result = [];
  for (let k = kMin; k <= kMax; k++) result.push(k * 360);
  return result;
}

function renderMarkers() {
  const needed = new Set(visibleOffsets());

  SPOTS.forEach(spot => {
    if (!activeMarkers[spot.id]) activeMarkers[spot.id] = {};
    const hl   = isHighlighted(spot);
    const icon = buildIcon(spot, hl);

    // 필요한 오프셋: 없으면 생성, 있으면 아이콘 갱신
    needed.forEach(offset => {
      if (activeMarkers[spot.id][offset]) {
        activeMarkers[spot.id][offset].setIcon(icon);
        activeMarkers[spot.id][offset].setZIndexOffset(hl ? 1000 : 0);
      } else {
        const m = L.marker([spot.lat, spot.lng + offset], { icon })
          .addTo(map)
          .bindPopup(buildPopupContent(spot), { maxWidth: 420, minWidth: 400, autoPanPadding: [30, 30] });
        m.on('click', () => selectSpot(spot.id));
        activeMarkers[spot.id][offset] = m;
      }
    });

    // 뷰포트 밖으로 나간 마커 제거
    Object.keys(activeMarkers[spot.id]).forEach(k => {
      const offset = Number(k);
      if (!needed.has(offset)) {
        activeMarkers[spot.id][offset].remove();
        delete activeMarkers[spot.id][offset];
      }
    });
  });
}

// 현재 뷰 중심에서 가장 가까운 활성 마커 반환
function closestMarker(id) {
  const centerLng = map.getCenter().lng;
  const set = Object.values(activeMarkers[id] || {});
  if (!set.length) return null;
  return set.reduce((best, m) => {
    const d  = Math.abs(m.getLatLng().lng - centerLng);
    const db = Math.abs(best.getLatLng().lng - centerLng);
    return d < db ? m : best;
  });
}

// 패닝/줌 시 마커 동적 업데이트
map.on('moveend', renderMarkers);

// Global helpers called from popup buttons
function flyHome() {
  closePopup();
}

function closePopup() {
  map.closePopup();
  map.flyTo(HOME_CENTER, HOME_ZOOM, { duration: 1.0 });
  selectedSpotId = null;
  document.querySelectorAll('.spot-card').forEach(c => c.classList.remove('active'));
}

// 빈 공간 클릭 시에도 닫기 + 축소
map.on('click', () => {
  if (map._popup) closePopup();
});

// ── Spot List ─────────────────────────────
function renderSpotList() {
  const listEl = document.getElementById('spot-list');
  listEl.innerHTML = '';

  const sorted = [...SPOTS].sort((a, b) => (isHighlighted(a) ? 0 : 1) - (isHighlighted(b) ? 0 : 1));

  sorted.forEach(spot => {
    const hl   = isHighlighted(spot);
    const card = document.createElement('div');
    card.className = `spot-card${hl ? '' : ' dimmed'}${selectedSpotId === spot.id ? ' active' : ''}`;
    card.dataset.id = spot.id;

    const pills = spot.bestMonths.map(m =>
      `<span class="month-pill best" title="${MONTH_NAMES[m]}">${MONTH_SHORT[m]}</span>`
    ).join('');
    const tags = spot.creatures.slice(0, 4).map(c => `<span class="creature-tag">${c}</span>`).join('');

    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-name">${spot.icon} ${spot.name}</div>
          <div class="card-country">${spot.country}</div>
        </div>
        <div class="best-months-wrap">${pills}</div>
      </div>
      <div class="card-meta">
        <span>🏊 ${spot.depth}</span>
        <span>👁 ${spot.visibility}</span>
        <span>⭐ ${spot.difficulty}</span>
      </div>
      <div class="card-creatures">${tags}</div>`;

    card.addEventListener('click', () => selectSpot(spot.id));
    listEl.appendChild(card);
  });

  // stats
  const hlCount = SPOTS.filter(s => isHighlighted(s)).length;
  document.getElementById('stat-highlight').textContent = hlCount;
  document.getElementById('panel-subtitle').textContent =
    selectedMonth === 0
      ? `전세계 ${SPOTS.length}개 베스트 포인트`
      : `${MONTH_NAMES[selectedMonth]} 추천 ${hlCount}개 하이라이트`;

  // sync mobile sheet
  if (document.getElementById('sheet-body')) syncSheetList();
}


// ── Select Spot ───────────────────────────
function selectSpot(id) {
  selectedSpotId = id;
  const spot = SPOTS.find(s => s.id === id);

  // update card highlight
  document.querySelectorAll('.spot-card').forEach(c =>
    c.classList.toggle('active', parseInt(c.dataset.id) === id)
  );
  const activeCard = document.querySelector('.spot-card.active');
  if (activeCard) activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // 현재 뷰에서 가장 가까운 복사본으로 이동
  const target = closestMarker(id);
  const latlng = target.getLatLng();

  // 팝업이 마커 위에 뜨므로, flyTo 목표를 팝업 절반 높이만큼 위로 올려서
  // 애니메이션 완료 시 마커가 화면 하단에 자리잡도록 함
  // zoom 6 기준 화면 세로 약 700px → 350px 오프셋 ≈ 위도 0.55°
  const POPUP_OFFSET_DEG = 0.55;
  const flyCenter = L.latLng(latlng.lat + POPUP_OFFSET_DEG, latlng.lng);
  map.flyTo(flyCenter, 6, { duration: 1.2 });

  setTimeout(() => {
    target.openPopup();
  }, 1300);
}

// ── Month Filter ──────────────────────────
document.querySelectorAll('.month-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedMonth = parseInt(btn.dataset.month);
    renderMarkers();
    renderSpotList();

    if (selectedSpotId !== null && selectedMonth !== 0) {
      const spot = SPOTS.find(s => s.id === selectedSpotId);
      if (spot && !spot.bestMonths.includes(selectedMonth)) {
        map.closePopup();
        selectedSpotId = null;
        document.querySelectorAll('.spot-card').forEach(c => c.classList.remove('active'));
      }
    }
  });
});

// ── Mobile Bottom Sheet ───────────────────
let sheetOpen = false;

function toggleSheet(forceOpen) {
  const sheet = document.getElementById('bottom-sheet');
  const fab   = document.getElementById('fab-list');
  sheetOpen = forceOpen !== undefined ? forceOpen : !sheetOpen;
  sheet.classList.toggle('open', sheetOpen);
  fab.textContent = sheetOpen ? '✕ 닫기' : '🤿 목록 보기';
}

function syncSheetList() {
  const sheetBody = document.getElementById('sheet-body');
  const listEl    = document.getElementById('spot-list');
  // mirror the desktop list into the sheet
  sheetBody.innerHTML = listEl.innerHTML;
  // re-attach click events
  sheetBody.querySelectorAll('.spot-card').forEach(card => {
    card.addEventListener('click', () => {
      selectSpot(parseInt(card.dataset.id));
      toggleSheet(false);
    });
  });
  // sync subtitle + stats
  const sub = document.getElementById('panel-subtitle').textContent;
  document.getElementById('sheet-subtitle').textContent = sub;
  document.getElementById('stat-total-m').textContent   = document.getElementById('stat-total').textContent;
  document.getElementById('stat-highlight-m').textContent = document.getElementById('stat-highlight').textContent;
}

// ── Init ──────────────────────────────────
renderMarkers();
renderSpotList();
syncSheetList();
</script>
</body>
</html>
